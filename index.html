
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }

  .app { display: flex; flex-direction: column; height: 620px; background: var(--color-background-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }

  /* Login Screen */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 0; padding: 2rem; }
  .login-logo { width: 72px; height: 72px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
  .login-logo i { font-size: 38px; color: #fff; }
  .login-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.4rem; }
  .login-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; }
  .login-card { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.5rem; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 1rem; }
  .field-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .field-wrap { display: flex; flex-direction: column; }
  .name-input { width: 100%; padding: 0 12px; height: 40px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 15px; outline: none; }
  .name-input:focus { border-color: #25D366; box-shadow: 0 0 0 2px #25D36620; }
  .color-row { display: flex; gap: 8px; }
  .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform 0.15s; }
  .color-btn.selected { border-color: var(--color-text-primary); transform: scale(1.15); }
  .join-btn { width: 100%; height: 42px; background: #25D366; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .join-btn:hover { background: #1ebe5c; }
  .waiting-note { font-size: 12px; color: var(--color-text-tertiary); text-align: center; }

  /* Chat Screen */
  .chat-screen { display: flex; flex-direction: column; height: 100%; }
  .chat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #075E54; color: #fff; }
  .header-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: #fff; flex-shrink: 0; }
  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 500; }
  .header-status { font-size: 12px; opacity: 0.8; }
  .header-icons { display: flex; gap: 16px; }
  .header-icons i { font-size: 20px; cursor: pointer; opacity: 0.9; }

  .chat-bg { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; background: #ECE5DD; }
  @media (prefers-color-scheme: dark) { .chat-bg { background: #1a1a2e; } }

  .day-label { text-align: center; margin: 8px 0; }
  .day-label span { background: #fff; color: #667781; font-size: 12px; padding: 4px 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.1); }

  .bubble-wrap { display: flex; flex-direction: column; }
  .bubble-wrap.me { align-items: flex-end; }
  .bubble-wrap.other { align-items: flex-start; }

  .bubble { max-width: 72%; padding: 7px 12px 6px; border-radius: 8px; font-size: 14px; line-height: 1.5; position: relative; word-break: break-word; }
  .bubble.me { background: #DCF8C6; color: #111; border-top-right-radius: 2px; }
  .bubble.other { background: #fff; color: #111; border-top-left-radius: 2px; }
  @media (prefers-color-scheme: dark) {
    .bubble.me { background: #005C4B; color: #e8e8e8; }
    .bubble.other { background: #202C33; color: #e8e8e8; }
    .day-label span { background: #2a3942; color: #aebac1; }
  }
  .bubble-sender { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .bubble-time { font-size: 11px; color: #667781; text-align: right; margin-top: 2px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
  .bubble.me .bubble-time { color: #4fc97a; }
  .bubble-time i { font-size: 13px; }

  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: #fff; border-radius: 8px; width: fit-content; margin: 4px 0; border-top-left-radius: 2px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .chat-footer { background: #f0f2f5; padding: 8px 12px; display: flex; gap: 8px; align-items: flex-end; border-top: 0.5px solid var(--color-border-tertiary); }
  @media (prefers-color-scheme: dark) { .chat-footer { background: #1f2c34; } }
  .footer-icons { display: flex; gap: 8px; align-items: center; }
  .footer-icons i { font-size: 22px; color: #54656f; cursor: pointer; }
  .msg-input-wrap { flex: 1; background: #fff; border-radius: 24px; padding: 8px 14px; display: flex; align-items: center; }
  @media (prefers-color-scheme: dark) { .msg-input-wrap { background: #2a3942; } }
  .msg-input { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; color: var(--color-text-primary); resize: none; max-height: 100px; font-family: var(--font-sans); }
  .msg-input::placeholder { color: var(--color-text-tertiary); }
  .send-btn { width: 46px; height: 46px; border-radius: 50%; background: #25D366; border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
  .send-btn:hover { background: #1ebe5c; }
  .send-btn i { font-size: 22px; }

  .hidden { display: none !important; }
  .waiting-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; padding: 2rem; }
  .waiting-screen i { font-size: 48px; color: #25D366; }
  .waiting-screen p { color: var(--color-text-secondary); font-size: 15px; text-align: center; }
  .waiting-badge { background: #25D36620; color: #0a8f47; padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 500; }
</style>

<h2 class="sr-only">غرفة محادثة بين شخصين — واتساب</h2>
<div class="app" id="app">

  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-logo"><i class="ti ti-brand-whatsapp" aria-hidden="true"></i></div>
    <div class="login-title">WhatsApp Chat</div>
    <div class="login-sub">سجّل اسمك وابدأ المحادثة</div>
    <div class="login-card">
      <div class="field-wrap">
        <div class="field-label">اسمك</div>
        <input class="name-input" id="nameInput" type="text" placeholder="أدخل اسمك..." maxlength="20" />
      </div>
      <div class="field-wrap">
        <div class="field-label">لون الرسائل</div>
        <div class="color-row" id="colorRow">
          <div class="color-btn selected" data-color="#25D366" style="background:#25D366"></div>
          <div class="color-btn" data-color="#7F77DD" style="background:#7F77DD"></div>
          <div class="color-btn" data-color="#D85A30" style="background:#D85A30"></div>
          <div class="color-btn" data-color="#378ADD" style="background:#378ADD"></div>
          <div class="color-btn" data-color="#D4537E" style="background:#D4537E"></div>
          <div class="color-btn" data-color="#BA7517" style="background:#BA7517"></div>
        </div>
      </div>
      <button class="join-btn" id="joinBtn">دخول للمحادثة</button>
      <div class="waiting-note" id="waitNote"></div>
    </div>
  </div>

  <!-- Waiting -->
  <div class="waiting-screen hidden" id="waitingScreen">
    <i class="ti ti-clock" aria-hidden="true"></i>
    <p>في انتظار الشخص الثاني...</p>
    <div class="waiting-badge" id="waitBadge"></div>
    <p style="font-size:13px; color: var(--color-text-tertiary);">اطلب من الشخص الآخر يفتح نفس الصفحة ويسجل اسمه</p>
  </div>

  <!-- Chat -->
  <div class="chat-screen hidden" id="chatScreen">
    <div class="chat-header">
      <div class="header-avatar" id="headerAvatar"></div>
      <div class="header-info">
        <div class="header-name" id="headerName"></div>
        <div class="header-status" id="headerStatus">متصل الآن</div>
      </div>
      <div class="header-icons">
        <i class="ti ti-video" aria-hidden="true"></i>
        <i class="ti ti-phone" aria-hidden="true"></i>
        <i class="ti ti-dots-vertical" aria-hidden="true"></i>
      </div>
    </div>
    <div class="chat-bg" id="chatBg">
      <div class="day-label"><span id="todayLabel"></span></div>
    </div>
    <div class="chat-footer">
      <div class="footer-icons">
        <i class="ti ti-mood-smile" aria-hidden="true"></i>
        <i class="ti ti-paperclip" aria-hidden="true"></i>
      </div>
      <div class="msg-input-wrap">
        <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالة..." rows="1"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" aria-label="إرسال"><i class="ti ti-send" aria-hidden="true"></i></button>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = 'wa_chat_room_v3';
const MAX_USERS = 2;

let myName = '';
let myColor = '#25D366';
let myId = '';
let pollInterval = null;

function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; }
}
function setState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function initState() {
  return { users: {}, messages: [], typing: {} };
}

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function getToday() {
  return new Date().toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

function avatarColor(color) { return color || '#25D366'; }

function renderAvatar(name, color, size) {
  const initials = name ? name.charAt(0).toUpperCase() : '?';
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.42)}px;font-weight:500;color:#fff;flex-shrink:0;">${initials}</div>`;
}

// Color picker
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    myColor = btn.dataset.color;
  });
});

document.getElementById('joinBtn').addEventListener('click', join);
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') join(); });

function join() {
  const name = document.getElementById('nameInput').value.trim();
  if(!name) { document.getElementById('nameInput').focus(); return; }

  let state = getState() || initState();
  const users = Object.values(state.users);

  // Check if already full (2 different users not us)
  const existingOthers = users.filter(u => u.name !== name);
  if(existingOthers.length >= MAX_USERS) {
    document.getElementById('waitNote').textContent = 'الغرفة ممتلئة! جرّب بعد قليل.';
    return;
  }

  myName = name;
  myId = name + '_' + Math.random().toString(36).slice(2,6);

  // Register user
  state.users[myId] = { id: myId, name: myName, color: myColor, lastSeen: Date.now() };
  setState(state);

  checkAndStart(state);
}

function checkAndStart(state) {
  const users = Object.values(state.users).filter(u => Date.now() - u.lastSeen < 30000);
  if(users.length >= 2) {
    startChat(state, users);
  } else {
    showWaiting();
    pollInterval = setInterval(() => {
      let s = getState() || initState();
      // Update our heartbeat
      if(s.users[myId]) { s.users[myId].lastSeen = Date.now(); setState(s); }
      const activeUsers = Object.values(s.users).filter(u => Date.now() - u.lastSeen < 30000);
      if(activeUsers.length >= 2) {
        clearInterval(pollInterval);
        startChat(s, activeUsers);
      }
    }, 1000);
  }
}

function showWaiting() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('waitingScreen').classList.remove('hidden');
  document.getElementById('waitBadge').textContent = 'دخلت: ' + myName;
}

function startChat(state, users) {
  document.getElementById('waitingScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');

  const other = users.find(u => u.id !== myId) || users.find(u => u.name !== myName) || users[0];
  const otherName = other ? other.name : 'المستخدم الثاني';
  const otherColor = other ? other.color : '#7F77DD';

  document.getElementById('headerName').textContent = otherName;
  const ha = document.getElementById('headerAvatar');
  ha.style.background = otherColor;
  ha.textContent = otherName.charAt(0).toUpperCase();

  document.getElementById('todayLabel').textContent = getToday();

  renderMessages(state.messages, users);

  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => {
    let s = getState() || initState();
    if(s.users[myId]) { s.users[myId].lastSeen = Date.now(); setState(s); }
    renderMessages(s.messages, Object.values(s.users));

    // typing indicator
    const others = Object.values(s.users).filter(u => u.id !== myId);
    const someoneTyping = others.some(u => s.typing && s.typing[u.id] && Date.now() - s.typing[u.id] < 2500);
    const ti = document.getElementById('typingIndicator');
    if(someoneTyping && !ti) {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap other';
      wrap.id = 'typingWrap';
      wrap.innerHTML = `<div class="typing-indicator" id="typingIndicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      document.getElementById('chatBg').appendChild(wrap);
      document.getElementById('chatBg').scrollTop = 99999;
    } else if(!someoneTyping && ti) {
      const tw = document.getElementById('typingWrap');
      if(tw) tw.remove();
    }
  }, 800);

  const msgInput = document.getElementById('msgInput');
  msgInput.addEventListener('input', () => {
    let s = getState() || initState();
    if(!s.typing) s.typing = {};
    s.typing[myId] = Date.now();
    setState(s);
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  });

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

let lastMsgCount = 0;
function renderMessages(messages, users) {
  if(messages.length === lastMsgCount) return;
  lastMsgCount = messages.length;

  const chatBg = document.getElementById('chatBg');
  const dayLabel = document.getElementById('todayLabel')?.parentElement;

  // Remove old bubbles
  Array.from(chatBg.querySelectorAll('.bubble-wrap')).forEach(el => el.remove());

  messages.forEach(msg => {
    const isMe = msg.senderId === myId;
    const sender = users.find(u => u.id === msg.senderId);
    const senderColor = sender ? sender.color : '#888';

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ' + (isMe ? 'me' : 'other');

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isMe ? 'me' : 'other');
    if(isMe) bubble.style.background = senderColor + 'CC';

    if(!isMe) {
      const senderSpan = document.createElement('div');
      senderSpan.className = 'bubble-sender';
      senderSpan.style.color = senderColor;
      senderSpan.textContent = msg.senderName;
      bubble.appendChild(senderSpan);
    }

    const text = document.createElement('div');
    text.textContent = msg.text;
    bubble.appendChild(text);

    const timeRow = document.createElement('div');
    timeRow.className = 'bubble-time';
    timeRow.innerHTML = msg.time + (isMe ? ' <i class="ti ti-checks" aria-hidden="true" style="color:#4fc97a"></i>' : '');
    bubble.appendChild(timeRow);

    wrap.appendChild(bubble);
    chatBg.appendChild(wrap);
  });

  chatBg.scrollTop = 99999;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;

  let s = getState() || initState();
  s.messages.push({ senderId: myId, senderName: myName, text, time: getTime(), id: Date.now() });
  if(s.typing) delete s.typing[myId];
  setState(s);

  input.value = '';
  input.style.height = 'auto';

  const users = Object.values(s.users);
  renderMessages(s.messages, users);
}
</script>
